

# メインペインのサイズ
set -w -g main-pane-width 85


# マウスの設定
# -----------
setw -g mouse
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

# color の設定
# ------------
set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"


# キーバインド系
# --------------

# ウィンドウの分割
unbind v
bind v split-window -h
unbind w
bind w split-window -v

# vim ライクなペイン移動
unbind h
bind h select-pane -L
unbind j
bind j select-pane -D
unbind k
bind k select-pane -U
unbind l # normally used for last-window
bind l select-pane -R

# Resizing (mouse also works).
unbind Left
bind -r Left resize-pane -L 5
unbind Right
bind -r Right resize-pane -R 5
unbind Down
bind -r Down resize-pane -D 5
unbind Up
bind -r Up resize-pane -U 5

# Window の見た目に関する設定
# ---------------------------

#  番号の始まりを1にする
set-option -g base-index 1
# status line を表示する
set-option -g status on
# tatus line を更新する間隔を 1 秒にする
set-option -g status-interval 1
# window-status を中央揃えで配置する
set-option -g status-justify "centre"
# status line の背景色を指定する。
set-option -g status-bg "colour238"
# status line の文字色を指定する。
set-option -g status-fg "colour255"
# status-left の最大の長さを指定する
set-option -g status-left-length 20
# status-left のフォーマットを指定する。
set-option -g status-left "#[fg=colour255,bg=colour241]Session: #S #[default]"
# status-right の最大の長さを指定する。
set-option -g status-right-length 60
# status-right のフォーマットを指定する。
set-option -g status-right "#[fg=colour255,bg=colour241] #h | LA: #(cut -d' ' -f-3 /proc/loadavg) | %m/%d %H:%M:%S#[default]"
# window-status のフォーマットを指定する。
set-window-option -g window-status-format " #I: #W "
# カレントウィンドウの window-status のフォーマットを指定する
set-window-option -g window-status-current-format "#[fg=colour255,bg=colour27,bold] #I: #W #[default]"


# mac os x 環境下でのコピー連携
# <pre> + [ で tmux のコピーモードに入ったあと，
# Space, v : コピー箇所の選択開始
# Enter, y : 選択した部分のコピー(クリップボードへ反映される)
if-shell 'test "$(uname -s)" = Darwin && which reattach-to-user-namespace > /dev/null 2>&1' 'source-file ~/.tmux.darwin.conf'
setw -g mode-keys vi

